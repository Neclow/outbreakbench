[workspace]
authors = ["Neclow <neilclow24@gmail.com>"]
channels = ["conda-forge"]
name = "outbreakbench"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
# Validation
validate-npis = "python scripts/validate/npis.py"
validate-scenarios = "python scripts/validate/scenarios.py"
validate-surveillance = "python scripts/validate/surveillance.py"
# Running
smoke = "python scripts/run/benchmark.py --model nemotron-3-nano:30b --model qwen3:14b --smoke-test"
benchmark = "python scripts/run/benchmark.py --skip-existing"
baselines = "python scripts/run/baselines.py"
sweep = "bash scripts/run/sweep.sh"
# Analysis
analyze = "python scripts/analyze/llm_decisions.py"
report = "python scripts/analyze/scenario_report.py"

[dependencies]
python = ">=3.13,<3.14"
matplotlib = ">=3.9,<4"
seaborn = ">=0.13,<0.14"
scipy = ">=1.13,<1.16"

[pypi-dependencies]
covasim = { git = "https://github.com/starsimhub/covasim.git" }
openai = ">=1.0"
outbreakbench = { path = ".", editable = true }
